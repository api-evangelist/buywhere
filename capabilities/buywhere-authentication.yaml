naftiko: 1.0.0-alpha2
info:
  label: BuyWhere Product Catalog API — Authentication
  description: 'BuyWhere Product Catalog API — Authentication. 1 operations. Lead operation: Register Agent And Issue API
    Key. Self-contained Naftiko capability covering one Buywhere business surface.'
  tags:
  - Buywhere
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BUYWHERE_API_KEY: BUYWHERE_API_KEY
capability:
  consumes:
  - type: http
    namespace: buywhere-authentication
    baseUri: https://api.buywhere.ai/v1
    description: BuyWhere Product Catalog API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: auth-register
      path: /auth/register
      operations:
      - name: registeragent
        method: POST
        description: Register Agent And Issue API Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.BUYWHERE_API_KEY}}'
  exposes:
  - type: rest
    namespace: buywhere-authentication-rest
    port: 8080
    description: REST adapter for BuyWhere Product Catalog API — Authentication. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/auth/register
      name: auth-register
      description: REST surface for auth-register.
      operations:
      - method: POST
        name: registeragent
        description: Register Agent And Issue API Key
        call: buywhere-authentication.registeragent
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: buywhere-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for BuyWhere Product Catalog API — Authentication. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: register-agent-and-issue-api
      description: Register Agent And Issue API Key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: buywhere-authentication.registeragent
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
