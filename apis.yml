aid: buywhere
url: https://raw.githubusercontent.com/api-evangelist/buywhere/refs/heads/main/apis.yml
name: BuyWhere
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
description: >-
  Agent-native, MCP-native product catalog and price comparison API for Southeast Asia and US e-commerce. Search 1.5M+
  products across Shopee, Lazada, Carousell, FairPrice, Best Denki, Amazon, Walmart, Best Buy, and 20+ retailers. AI
  agents and MCP clients discover and route purchases to local merchants through a hosted MCP HTTP endpoint at
  api.buywhere.ai/mcp or via the @buywhere/mcp-server STDIO package.
created: '2026-05-16'
modified: '2026-05-19'
specificationVersion: '0.19'
position: Consumer
access: 3rd-Party
tags:
  - E-commerce
  - Shopping
  - Price Comparison
  - SEA
  - Southeast Asia
  - AI Agents
  - Product Catalog
apis:
  - aid: buywhere:product-catalog-api
    name: BuyWhere Product Catalog API
    description: >-
      Agent-native REST and MCP product catalog covering 1.5M+ products across Southeast Asian and US e-commerce
      platforms. Operations include keyword search, side-by-side comparison, deals discovery, price history, and
      category browsing. Responses are Schema.org-compatible (Product, Offer, ItemList) and include normalized
      structured_specs and comparison_attributes so LLMs can rank and reason without scraping. Same operations are
      exposed to MCP clients at api.buywhere.ai/mcp.
    humanURL: https://api.buywhere.ai/
    baseURL: https://api.buywhere.ai/v1
    tags:
      - E-commerce
      - Shopping
      - Price Comparison
      - SEA
      - Southeast Asia
      - AI Agents
      - Product Catalog
      - MCP
